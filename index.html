<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اللجنة الرياضية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f3e9;
    --panel:#ffffff;
    --panel-alt:#f1eee0;
    --border:#ddd5ba;
    --text:#26301f;
    --text-dim:#847f68;
    --brand-dark:#1f4d33;
    --brand-darker:#163a26;
    --gold:#b9862b;
    --gold-bright:#d7a23c;
    --gold-soft:#f3e3bd;
    --red-card:#b8412f;
    --red-soft:#f6dcd5;
    --shadow:0 2px 12px rgba(31,77,51,0.07);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Cairo', sans-serif;}
  .mono{font-family:'Space Mono', monospace;}

  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 28px;
    border-bottom:2px solid var(--border);
    background:var(--panel);
    flex-wrap:wrap;
    gap:12px;
    box-shadow:var(--shadow);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:14px;height:14px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px rgba(185,134,43,0.5);}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:0.5px;color:var(--brand-dark);}

  .league-tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .league-tab{
    padding:8px 16px;border-radius:999px;border:1px solid var(--border);
    background:var(--panel-alt);color:var(--text-dim);cursor:pointer;font-family:'Tajawal';font-size:14px;
    transition:all .15s;
  }
  .league-tab.active{background:var(--brand-dark);color:#fff;border-color:var(--brand-dark);font-weight:700;}
  .league-tab:hover{border-color:var(--gold);}

  .mode-toggle{
    display:flex;gap:6px;background:var(--panel-alt);border:1px solid var(--border);border-radius:999px;padding:4px;flex-wrap:wrap;
  }
  .mode-toggle button{
    border:none;background:transparent;color:var(--text-dim);padding:8px 16px;border-radius:999px;cursor:pointer;font-family:'Cairo';font-weight:700;font-size:13px;
  }
  .mode-toggle button.active{background:var(--gold);color:#fff;}

  main{max-width:1100px;margin:0 auto;padding:28px;}
  .empty-hint{text-align:center;color:var(--text-dim);padding:60px 20px;}
  .empty-hint button{margin-top:14px;}

  /* Scoreboard hero */
  .hero{
    display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:36px;
  }
  @media (max-width:720px){.hero{grid-template-columns:1fr;}}
  .board{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px 22px;
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .board .tag{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'Cairo';font-weight:800;font-size:13px;letter-spacing:1px;
    padding:4px 12px;border-radius:6px;margin-bottom:14px;
  }
  .board.live .tag{background:var(--red-card);color:#fff;}
  .board.live .tag .pulse{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .board.next .tag{background:var(--gold-soft);color:var(--gold);}
  .matchup{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1;}
  .team-block{flex:1;text-align:center;}
  .team-name{font-family:'Cairo';font-weight:700;font-size:19px;line-height:1.3;color:var(--brand-dark);}
  .score{font-family:'Space Mono';font-weight:700;font-size:44px;display:flex;align-items:center;gap:14px;padding:0 8px;color:var(--brand-dark);}
  .vs-label{font-family:'Space Mono';color:var(--text-dim);font-size:13px;}
  .board .meta{margin-top:14px;color:var(--text-dim);font-size:13px;font-family:'Space Mono';text-align:center;}
  .board .motm{margin-top:10px;text-align:center;font-size:13px;color:var(--gold);}
  .board.empty{display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:14px;min-height:140px;}

  /* Standings */
  section.block{margin-bottom:40px;}
  section.block h2{font-size:20px;border-right:4px solid var(--gold);padding-right:12px;margin-bottom:16px;color:var(--brand-dark);}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
  .table-scroll table{border-radius:0;}
  th,td{padding:10px 12px;text-align:center;font-size:14px;}
  th{background:var(--brand-dark);color:#fff;font-family:'Cairo';font-weight:700;font-size:13px;}
  td.team-cell{text-align:right;font-family:'Cairo';font-weight:600;}
  tr:not(:last-child) td{border-bottom:1px solid var(--border);}
  tr.rank1 td.team-cell{color:var(--gold);}
  tr:nth-child(even) td{background:var(--panel-alt);}

  /* Fixtures */
  .matchday{margin-bottom:24px;}
  .matchday h3{font-size:15px;color:var(--brand-dark);font-weight:700;margin:0 0 10px;font-family:'Cairo';}
  .matchday-honors{
    display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;padding:8px 14px;
    background:var(--gold-soft);border-radius:8px;font-size:13px;color:var(--brand-dark);
  }
  .match-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:12px 16px;margin-bottom:8px;gap:10px;flex-wrap:wrap;
  }
  .match-row .side{flex:1;font-family:'Cairo';font-weight:600;font-size:14px;}
  .match-row .side.home{text-align:left;}
  .match-row .side.away{text-align:right;}
  .match-row .center{text-align:center;min-width:90px;}
  .match-row .center .mono{font-size:18px;font-weight:700;color:var(--brand-dark);}
  .status-pill{font-size:11px;padding:2px 10px;border-radius:999px;display:inline-block;margin-top:4px;font-family:'Cairo';}
  .status-scheduled{background:var(--panel-alt);color:var(--text-dim);}
  .status-live{background:var(--red-card);color:#fff;}
  .status-finished{background:var(--gold-soft);color:var(--gold);}

  /* Buttons/forms */
  button{cursor:pointer;font-family:'Tajawal';}
  .btn{
    background:var(--brand-dark);color:#fdfbf3;border:none;border-radius:8px;
    padding:9px 18px;font-weight:700;font-family:'Cairo';font-size:14px;
  }
  .btn:hover{background:var(--brand-darker);}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold);}
  .btn.danger{background:var(--red-card);color:#fff;}
  .btn.small{padding:6px 12px;font-size:12px;}
  .btn.tiny{padding:3px 9px;font-size:14px;line-height:1;}
  input,select{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:9px 12px;border-radius:8px;font-family:'Tajawal';font-size:14px;
  }
  input:focus,select:focus{outline:none;border-color:var(--gold);}

  .admin-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;box-shadow:var(--shadow);
  }
  .admin-card h3{margin:0 0 14px;font-size:16px;color:var(--brand-dark);}
  .row-inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .team-chip{
    display:inline-flex;align-items:center;gap:8px;background:var(--panel-alt);
    border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:13px;margin:4px;
  }
  .team-chip button{background:none;border:none;color:var(--red-card);font-weight:700;font-size:14px;}
  .league-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
  .match-admin-row{
    display:grid;grid-template-columns:1fr 70px 1fr auto;gap:8px;align-items:center;margin-bottom:8px;
  }
  .match-admin-row select{width:100%;}
  .score-input{width:60px;text-align:center;}
  .subtle{color:var(--text-dim);font-size:12px;}
  footer{text-align:center;padding:30px;color:var(--text-dim);font-size:12px;}

  .announcements-board{
    background:var(--panel);border:1px solid var(--border);border-right:4px solid var(--gold);
    border-radius:10px;padding:18px 20px;margin-bottom:36px;box-shadow:var(--shadow);
  }
  .announcements-board h2{font-size:18px;margin:0 0 12px;border:none;padding:0;color:var(--brand-dark);}
  .announcement-item{
    padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .announcement-item:last-child{border-bottom:none;}
  .announcement-text{font-size:14px;line-height:1.6;}
  .announcement-date{font-size:11px;color:var(--text-dim);font-family:'Space Mono';white-space:nowrap;}
  textarea{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:12px;border-radius:8px;font-family:'Tajawal';font-size:14px;width:100%;min-height:220px;resize:vertical;
  }
  textarea:focus{outline:none;border-color:var(--gold);}
  .regulations-content{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:26px 30px;
    white-space:pre-wrap;line-height:1.9;font-size:15px;box-shadow:var(--shadow);
  }

  .scorer-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;
  }
  .scorer-name{font-family:'Cairo';font-weight:600;flex:1;}
  .scorer-controls{display:flex;align-items:center;gap:6px;}
  .goal-count{font-family:'Space Mono';font-weight:700;min-width:26px;text-align:center;color:var(--brand-dark);}

  .league-section-title{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
  }
  .roster-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
  .roster-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
  .roster-card h3{margin:0 0 10px;font-size:15px;color:var(--brand-dark);}
  .roster-list{list-style:none;padding:0;margin:0;}
  .roster-list li{padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;display:flex;justify-content:space-between;align-items:center;}
  .roster-list li:last-child{border-bottom:none;}

  /* ===== Mobile fixes ===== */
  @media (max-width:640px){
    header.topbar{
      flex-direction:column;
      align-items:stretch;
      padding:14px 16px;
      gap:10px;
    }
    .brand{justify-content:center;}
    .league-tabs{
      justify-content:flex-start;
      overflow-x:auto;
      flex-wrap:nowrap;
      padding-bottom:4px;
      -webkit-overflow-scrolling:touch;
    }
    .league-tab{flex:0 0 auto;}
    .mode-toggle{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      background:var(--panel-alt);
      border:1px solid var(--border);
      border-radius:12px;
      padding:6px;
      width:100%;
    }
    .mode-toggle button{
      width:100%;
      border-radius:8px;
      padding:12px 6px;
      font-size:13px;
    }
    .mode-toggle button:last-child{
      grid-column:1 / -1;
    }

    main{padding:16px;}

    input,select,textarea{
      font-size:16px; /* prevents iOS zoom-on-focus */
      width:100%;
    }
    .row-inline{
      flex-direction:column;
      align-items:stretch;
    }
    .row-inline input,.row-inline select{width:100%;}
    .row-inline .btn{width:100%;}

    .btn,.btn.small{
      padding:12px 16px;
      font-size:14px;
      min-height:44px;
    }
    .btn.tiny{
      min-height:40px;
      min-width:40px;
      padding:0;
      font-size:18px;
    }

    .match-admin-row{
      grid-template-columns:1fr;
      gap:10px;
      background:var(--panel-alt);
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
    }
    .match-admin-row select{font-size:14px;}
    .match-admin-row .score-input,.score-input{
      width:100%;
      min-height:44px;
      font-size:16px;
    }
    .match-admin-row > div{
      display:flex;justify-content:center;gap:10px;
    }
    .match-admin-row button.btn.danger{width:100%;}

    .league-row{
      flex-direction:column;
      align-items:stretch;
      text-align:center;
    }
    .league-row .row-inline{flex-direction:row;justify-content:center;}
    .league-row .row-inline .btn{width:auto;flex:1;}

    .scorer-row{flex-direction:column;align-items:stretch;text-align:center;gap:8px;}
    .scorer-controls{justify-content:center;}

    .team-chip{font-size:14px;padding:8px 14px;}
    .team-chip button{font-size:16px;padding:0 4px;}

    .match-row .side.home{text-align:center;}
    .match-row .side.away{text-align:center;}
    .match-row{flex-direction:column;text-align:center;}

    .table-scroll{
      margin:0 -4px;
      padding:0 4px;
      box-shadow:var(--shadow);
      border-radius:10px;
    }
    .table-scroll table{
      min-width:480px;
      box-shadow:none;
    }
    .scorers-table table{
      min-width:0;
      max-width:320px;
      margin:0 auto;
    }
    .scorers-table th,.scorers-table td{
      padding:6px 6px;
      font-size:12px;
    }
    th,td{padding:8px 8px;font-size:12.5px;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <h1>اللجنة الرياضية</h1>
  </div>
  <div class="league-tabs" id="leagueTabs"></div>
  <div class="mode-toggle">
    <button id="btnPublic" class="active">العرض العام</button>
    <button id="btnStandings">الترتيب</button>
    <button id="btnLineups">التشكيلات</button>
    <button id="btnRegs">لوائح اللجنة الرياضية</button>
    <button id="btnAdmin">لوحة التحكم</button>
  </div>
</header>

<main id="app"></main>

<footer>منصة إدارة دوريات كرة القدم — البيانات محفوظة ومشتركة بين الزوار</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://football-79578-default-rtdb.firebaseio.com"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);
const dbRef = ref(db);

window.state = { leagues: [], activeLeagueId: null, announcements: [], regulationsText: '' };
let mode = 'public'; // public | admin | regulations | standings | lineups
let adminUnlocked = false;
const ADMIN_PIN = '12e34e';

function uid(){ return Math.random().toString(36).slice(2,9); }

function asArray(v){
  if(Array.isArray(v)) return v;
  if(v && typeof v === 'object') return Object.values(v);
  return [];
}

function ensureShape(){
  const s = window.state;
  s.leagues = asArray(s.leagues);
  if(!s.announcements) s.announcements = [];
  s.announcements = asArray(s.announcements);
  if(typeof s.regulationsText !== 'string') s.regulationsText = '';
  s.leagues.forEach(l=>{
    l.teams = asArray(l.teams);
    l.matchdays = asArray(l.matchdays);
    l.scorers = asArray(l.scorers);
    l.teams.forEach(t=>{ t.players = asArray(t.players); });
    l.matchdays.forEach(md=>{
      md.matches = asArray(md.matches);
      if(typeof md.bestPlayer !== 'string') md.bestPlayer = '';
      if(typeof md.bestGoalkeeper !== 'string') md.bestGoalkeeper = '';
      md.matches.forEach(m=>{ delete m.motm; });
    });
  });
  if(!s.activeLeagueId && s.leagues.length){ s.activeLeagueId = s.leagues[0].id; }
}

async function loadState(){
  try{
    const snapshot = await get(child(dbRef, 'league-app-state'));
    if (snapshot.exists()) {
      window.state = snapshot.val();
    }
  }catch(e){ console.log('لا توجد بيانات محفوظة بعد في السحابة', e); }
  ensureShape();
  render();
}

async function saveState(){
  try{
    await set(ref(db, 'league-app-state'), window.state);
  }catch(e){ console.error('فشل في حفظ وتحديث البيانات سحابياً', e); }
}

function activeLeague(){
  return window.state.leagues.find(l=>l.id===window.state.activeLeagueId) || null;
}
function teamName(league, teamId){
  const t = league.teams.find(t=>t.id===teamId);
  return t ? t.name : '—';
}

function computeStandings(league){
  const table = {};
  league.teams.forEach(t=>{ table[t.id] = {id:t.id,name:t.name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  league.matchdays.forEach(md=>{
    md.matches.forEach(m=>{
      if(m.status!=='finished' || m.homeScore===null || m.awayScore===null) return;
      const h = table[m.home], a = table[m.away];
      if(!h || !a) return;
      h.p++; a.p++;
      h.gf += m.homeScore; h.ga += m.awayScore;
      a.gf += m.awayScore; a.ga += m.homeScore;
      if(m.homeScore > m.awayScore){ h.w++; h.pts+=3; a.l++; }
      else if(m.homeScore < m.awayScore){ a.w++; a.pts+=3; h.l++; }
      else { h.d++; a.d++; h.pts++; a.pts++; }
    });
  });
  return Object.values(table).sort((x,y)=> (y.pts-x.pts) || ((y.gf-y.ga)-(x.gf-x.ga)) || (y.gf-x.gf));
}

function findFeatured(league){
  let live = null, next = null;
  const all = [];
  league.matchdays.forEach(md=> md.matches.forEach(m=> all.push(m)));
  live = all.find(m=>m.status==='live') || null;
  const scheduled = all.filter(m=>m.status==='scheduled' && m.date)
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
  next = scheduled[0] || null;
  return {live, next};
}

function fmtDate(m){
  if(!m.date) return 'موعد غير محدد';
  return m.date + (m.time ? ' — ' + m.time : '');
}

function render(){
  renderTabs();
  ['btnPublic','btnAdmin','btnRegs','btnStandings','btnLineups'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
  const activeBtnMap = {public:'btnPublic', admin:'btnAdmin', regulations:'btnRegs', standings:'btnStandings', lineups:'btnLineups'};
  document.getElementById(activeBtnMap[mode]).classList.add('active');
  const app = document.getElementById('app');
  if(mode==='public') app.innerHTML = renderPublic();
  else if(mode==='admin') app.innerHTML = renderAdmin();
  else if(mode==='regulations') app.innerHTML = renderRegulations();
  else if(mode==='standings') app.innerHTML = renderStandingsPage();
  else app.innerHTML = renderLineupsPage();
  attachHandlers();
}

function renderTabs(){
  const wrap = document.getElementById('leagueTabs');
  if(!window.state.leagues.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML = window.state.leagues.map(l=>
    `<button class="league-tab ${l.id===window.state.activeLeagueId?'active':''}" data-league="${l.id}">${l.name}</button>`
  ).join('');
}

function renderPublic(){
  const league = activeLeague();
  if(!league){
    const noLeagueAnnouncements = window.state.announcements.length ? `
      <div class="announcements-board">
        <h2>التصاريح</h2>
        ${window.state.announcements.slice().reverse().map(a=>`
          <div class="announcement-item">
            <div class="announcement-text">${a.text}</div>
            <div class="announcement-date">${a.date}</div>
          </div>
        `).join('')}
      </div>` : '';
    return `${noLeagueAnnouncements}<div class="empty-hint"><h2>لا يوجد دوري بعد</h2><p>انتقل إلى لوحة التحكم لإنشاء أول دوري.</p></div>`;
  }
  const {live, next} = findFeatured(league);
  const standings = computeStandings(league);

  const heroLive = live ? `
    <div class="board live">
      <span class="tag"><span class="pulse"></span> المباراة الآن</span>
      <div class="matchup">
        <div class="team-block"><div class="team-name">${teamName(league,live.home)}</div></div>
        <div class="score mono">${live.homeScore ?? 0} <span class="vs-label">—</span> ${live.awayScore ?? 0}</div>
        <div class="team-block"><div class="team-name">${teamName(league,live.away)}</div></div>
      </div>
      <div class="meta">${fmtDate(live)}</div>
    </div>` : `<div class="board empty">لا توجد مباراة جارية الآن</div>`;

  const heroNext = next ? `
    <div class="board next">
      <span class="tag">المباراة القادمة</span>
      <div class="matchup">
        <div class="team-block"><div class="team-name">${teamName(league,next.home)}</div></div>
        <div class="score mono"><span class="vs-label" style="font-size:20px">VS</span></div>
        <div class="team-block"><div class="team-name">${teamName(league,next.away)}</div></div>
      </div>
      <div class="meta">${fmtDate(next)}</div>
    </div>` : `<div class="board empty">لا توجد مباراة قادمة مجدولة</div>`;

  const standingsRows = standings.map((r,i)=>`
    <tr class="${i===0?'rank1':''}">
      <td>${i+1}</td>
      <td class="team-cell">${r.name}</td>
      <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td><td>${r.gf-r.ga}</td>
      <td class="mono" style="color:var(--gold);font-weight:700">${r.pts}</td>
    </tr>`).join('');

  const fixturesHtml = league.matchdays.length ? league.matchdays.map(md=>`
    <div class="matchday">
      <h3>${md.name}</h3>
      ${(md.bestPlayer || md.bestGoalkeeper) ? `
        <div class="matchday-honors">
          ${md.bestPlayer ? `<span>⭐ أفضل لاعب في الجولة: <strong>${md.bestPlayer}</strong></span>` : ''}
          ${md.bestGoalkeeper ? `<span>🧤 أفضل حارس في الجولة: <strong>${md.bestGoalkeeper}</strong></span>` : ''}
        </div>` : ''}
      ${md.matches.map(m=>`
        <div class="match-row">
          <div class="side home">${teamName(league,m.home)}</div>
          <div class="center">
            ${m.status==='finished'
              ? `<span class="mono">${m.homeScore} - ${m.awayScore}</span>`
              : `<span class="subtle">${fmtDate(m)}</span>`}
            <div><span class="status-pill status-${m.status}">${m.status==='finished'?'انتهت':m.status==='live'?'مباشر':'مجدولة'}</span></div>
          </div>
          <div class="side away">${teamName(league,m.away)}</div>
        </div>
      `).join('')}
    </div>
  `).join('') : `<p class="subtle">لا توجد جداول مباريات بعد.</p>`;

  const announcementsHtml = window.state.announcements.length ? `
    <div class="announcements-board">
      <h2>التصاريح</h2>
      ${window.state.announcements.slice().reverse().map(a=>`
        <div class="announcement-item">
          <div class="announcement-text">${a.text}</div>
          <div class="announcement-date">${a.date}</div>
        </div>
      `).join('')}
    </div>` : '';

  return `
    <div class="hero">${heroLive}${heroNext}</div>
    ${announcementsHtml}
    <section class="block">
      <h2>جدول المباريات والنتائج</h2>
      ${fixturesHtml}
    </section>
  `;
}

function renderRegulations(){
  const text = window.state.regulationsText.trim();
  return `
    <section class="block">
      <h2>لوائح اللجنة الرياضية</h2>
      <div class="regulations-content">${text ? text.replace(/</g,'&lt;') : '<span class="subtle">لم تُضف لوائح اللجنة الرياضية بعد.</span>'}</div>
    </section>
  `;
}

function renderStandingsPage(){
  if(!window.state.leagues.length){
    return `<div class="empty-hint"><h2>لا توجد دوريات بعد</h2></div>`;
  }
  return window.state.leagues.map(league=>{
    const standings = computeStandings(league);
    const rows = standings.map((r,i)=>`
      <tr class="${i===0?'rank1':''}">
        <td>${i+1}</td><td class="team-cell">${r.name}</td>
        <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gf}</td><td>${r.ga}</td><td>${r.gf-r.ga}</td>
        <td class="mono" style="color:var(--gold);font-weight:700">${r.pts}</td>
      </tr>`).join('');

    const scorers = (league.scorers||[]).slice().sort((a,b)=>b.goals-a.goals);
    const scorersRows = scorers.map((s,i)=>`
      <tr class="${i===0 && s.goals>0 ?'rank1':''}">
        <td>${i+1}</td><td class="team-cell">${s.name}</td>
        <td class="mono" style="font-weight:700;color:var(--gold)">${s.goals}</td>
      </tr>`).join('');

    return `
      <section class="block">
        <h2>ترتيب دوري — ${league.name}</h2>
        <div class="table-scroll">
          <table>
            <thead><tr><th>#</th><th style="text-align:right">الفريق</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>له</th><th>عليه</th><th>الفرق</th><th>نقاط</th></tr></thead>
            <tbody>${rows || `<tr><td colspan="10" class="subtle">لا توجد فرق مضافة بعد</td></tr>`}</tbody>
          </table>
        </div>
      </section>
      <section class="block">
        <h2>الهدافون — ${league.name}</h2>
        <div class="table-scroll scorers-table">
          <table>
            <thead><tr><th>#</th><th style="text-align:right">اللاعب</th><th>الأهداف</th></tr></thead>
            <tbody>${scorersRows || `<tr><td colspan="3" class="subtle">لا يوجد هدافون مضافون بعد</td></tr>`}</tbody>
          </table>
        </div>
      </section>
    `;
  }).join('<hr style="border:none;border-top:2px solid var(--border);margin:36px 0;">');
}

function renderLineupsPage(){
  const league = activeLeague();
  if(!league){
    return `<div class="empty-hint"><h2>اختر دورياً من الأعلى لعرض التشكيلات</h2></div>`;

  if(!league.teams.length){
    return `<div class="empty-hint"><h2>لا توجد فرق في هذا الدوري بعد</h2></div>`;

  return `
    <section class="block">
      <h2>تشكيلات دوري — ${league.name}</h2>

        ${league.teams.map(t=>`
          <div class="roster-card">

              ${(t.players && t.players.length) ? t.players.map(p=>`<li>${p.name}</li>`).join('') : `<li class="subtle">لا يوجد لاعبون مضافون بعد</li>`}

function attachHandlers(){
  document.getElementById('btnPublic').onclick = ()=>{ mode='public'; render(); };
  document.getElementById('btnAdmin').onclick = ()=>{ mode='admin'; render(); };
  document.getElementById('btnRegs').onclick = ()=>{ mode='regulations'; render(); };
  document.getElementById('btnStandings').onclick = ()=>{ mode='standings'; render(); };
  document.getElementById('btnLineups').onclick = ()=>{ mode='lineups'; render(); };

  document.querySelectorAll('[data-league]').forEach(b=>{
    b.onclick = ()=>{ window.state.activeLeagueId = b.dataset.league; render(); };
  });

  if(!adminUnlocked && mode==='admin'){
    const submit = document.getElementById('pinSubmit');
    if(submit) submit.onclick = ()=>{
      const val = document.getElementById('pinInput').value;
      if(val === ADMIN_PIN){ adminUnlocked = true; render(); }
      else alert('رمز الدخول غير صحيح');
    };
    return;
  }
  if(mode!=='admin') return;

  const addAnnouncementBtn = document.getElementById('addAnnouncementBtn');
  if(addAnnouncementBtn) addAnnouncementBtn.onclick = ()=>{
    const text = document.getElementById('newAnnouncementText').value.trim();
    if(!text) return;
    const now = new Date();
    const date = now.toISOString().slice(0,10);
    window.state.announcements.push({id:uid(), text, date});
    saveState(); render();
  };
  document.querySelectorAll('[data-delete-announcement]').forEach(b=>{
    b.onclick = ()=>{
      window.state.announcements = window.state.announcements.filter(a=>a.id!==b.dataset.deleteAnnouncement);
      saveState(); render();
    };
  });

  const saveRegulationsBtn = document.getElementById('saveRegulationsBtn');
  if(saveRegulationsBtn) saveRegulationsBtn.onclick = ()=>{
    window.state.regulationsText = document.getElementById('regulationsTextArea').value;
    saveState();
    alert('تم حفظ اللوائح');
  };

  const addLeagueBtn = document.getElementById('addLeagueBtn');
  if(addLeagueBtn) addLeagueBtn.onclick = ()=>{
    const name = document.getElementById('newLeagueName').value.trim();
    if(!name) return;
    const l = {id:uid(), name, teams:[], matchdays:[], scorers:[]};
    window.state.leagues.push(l);
    window.state.activeLeagueId = l.id;
    saveState(); render();
  };

  document.querySelectorAll('[data-select-league]').forEach(b=>{
    b.onclick = ()=>{ window.state.activeLeagueId = b.dataset.selectLeague; render(); };
  });
  document.querySelectorAll('[data-delete-league]').forEach(b=>{
    b.onclick = ()=>{
      if(!confirm('حذف هذا الدوري نهائياً؟')) return;
      window.state.leagues = window.state.leagues.filter(l=>l.id!==b.dataset.deleteLeague);
      if(window.state.activeLeagueId === b.dataset.deleteLeague){
        window.state.activeLeagueId = window.state.leagues[0]?.id || null;
      }
      saveState(); render();
    };
  });

  const addTeamBtn = document.getElementById('addTeamBtn');
  if(addTeamBtn) addTeamBtn.onclick = ()=>{
    const name = document.getElementById('newTeamName').value.trim();
    if(!name) return;
    activeLeague().teams.push({id:uid(), name, players:[]});
    saveState(); render();
  };
  document.querySelectorAll('[data-delete-team]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.teams = league.teams.filter(t=>t.id!==b.dataset.deleteTeam);
      saveState(); render();
    };
  });

  const addMatchdayBtn = document.getElementById('addMatchdayBtn');
  if(addMatchdayBtn) addMatchdayBtn.onclick = ()=>{
    const name = document.getElementById('newMatchdayName').value.trim();
    if(!name) return;
    activeLeague().matchdays.push({id:uid(), name, matches:[], bestPlayer:'', bestGoalkeeper:''});
    saveState(); render();
  };
  document.querySelectorAll('[data-delete-matchday]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.matchdays = league.matchdays.filter(md=>md.id!==b.dataset.deleteMatchday);
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-save-matchday-honors]').forEach(b=>{
    b.onclick = ()=>{
      const mdId = b.dataset.saveMatchdayHonors;
      const league = activeLeague();
      const md = league.matchdays.find(x=>x.id===mdId);
      md.bestPlayer = document.querySelector(`[data-md-best-player="${mdId}"]`).value;
      md.bestGoalkeeper = document.querySelector(`[data-md-best-gk="${mdId}"]`).value;
      saveState(); render();
    };
  });

  document.querySelectorAll('[data-add-match]').forEach(b=>{
    b.onclick = ()=>{
      const mdId = b.dataset.addMatch;
      const league = activeLeague();
      const md = league.matchdays.find(m=>m.id===mdId);
      const home = document.getElementById('newMatchHome_'+mdId).value;
      const away = document.getElementById('newMatchAway_'+mdId).value;
      if(!home || !away || home===away){ alert('اختر فريقين مختلفين'); return; }
      md.matches.push({id:uid(), home, away, homeScore:null, awayScore:null, status:'scheduled', date:'', time:''});
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-delete-match]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.matchdays.forEach(md=>{ md.matches = md.matches.filter(m=>m.id!==b.dataset.deleteMatch); });
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-save-match]').forEach(b=>{
    b.onclick = ()=>{
      const mId = b.dataset.saveMatch;
      const league = activeLeague();
      let match;
      league.matchdays.forEach(md=>{ const f = md.matches.find(m=>m.id===mId); if(f) match=f; });
      if(!match) return;
      const hs = document.querySelector(`[data-score-home="${mId}"]`).value;
      const as = document.querySelector(`[data-score-away="${mId}"]`).value;
      match.homeScore = hs===''? null : parseInt(hs);
      match.awayScore = as===''? null : parseInt(as);
      match.date = document.querySelector(`[data-date="${mId}"]`).value;
      match.time = document.querySelector(`[data-time="${mId}"]`).value;
      match.status = document.querySelector(`[data-status="${mId}"]`).value;
      saveState(); render();
    };
  });

  const addScorerBtn = document.getElementById('addScorerBtn');
  if(addScorerBtn) addScorerBtn.onclick = ()=>{
    const name = document.getElementById('newScorerName').value.trim();
    if(!name) return;
    activeLeague().scorers.push({id:uid(), name, goals:0});
    saveState(); render();
  };
  document.querySelectorAll('[data-scorer-delete]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.scorers = league.scorers.filter(s=>s.id!==b.dataset.scorerDelete);
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-scorer-inc]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      const s = league.scorers.find(x=>x.id===b.dataset.scorerInc);
      s.goals++;
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-scorer-dec]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      const s = league.scorers.find(x=>x.id===b.dataset.scorerDec);
      s.goals = Math.max(0, s.goals-1);
      saveState(); render();
    };
  });

  document.querySelectorAll('[data-add-player]').forEach(b=>{
    b.onclick = ()=>{
      const teamId = b.dataset.addPlayer;
      const league = activeLeague();
      const team = league.teams.find(t=>t.id===teamId);
      const input = document.getElementById('newPlayerName_'+teamId);
      const name = input.value.trim();
      if(!name) return;
      team.players.push({id:uid(), name});
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-delete-player]').forEach(b=>{
    b.onclick = ()=>{
      const [teamId, playerId] = b.dataset.deletePlayer.split('|');
      const league = activeLeague();
      const team = league.teams.find(t=>t.id===teamId);
      team.players = team.players.filter(p=>p.id!==playerId);
      saveState(); render();
    };
  });
}

loadState();
</script>
