<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الدوريات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-dark:#0d1f16;
    --pitch:#163a26;
    --pitch-line:#2b5a3c;
    --gold:#d4a72c;
    --gold-bright:#f0c94a;
    --paper:#f2efe4;
    --paper-dim:#c9c4b2;
    --red-card:#b8412f;
    --win:#3f8a5c;
    --draw:#9a8b4f;
    --loss:#8a3f3f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--pitch-dark);
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
    color:var(--paper);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Cairo', sans-serif;}
  .mono{font-family:'Space Mono', monospace;}

  header.topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 28px;
    border-bottom:2px solid var(--pitch-line);
    background:linear-gradient(180deg, var(--pitch) 0%, var(--pitch-dark) 100%);
    flex-wrap:wrap;
    gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:14px;height:14px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:0.5px;}

  .league-tabs{display:flex;gap:8px;flex-wrap:wrap;}
  .league-tab{
    padding:8px 16px;border-radius:999px;border:1px solid var(--pitch-line);
    background:transparent;color:var(--paper-dim);cursor:pointer;font-family:'Tajawal';font-size:14px;
    transition:all .15s;
  }
  .league-tab.active{background:var(--gold);color:var(--pitch-dark);border-color:var(--gold);font-weight:700;}
  .league-tab:hover{border-color:var(--gold);}

  .mode-toggle{
    display:flex;gap:6px;background:var(--pitch-dark);border:1px solid var(--pitch-line);border-radius:999px;padding:4px;
  }
  .mode-toggle button{
    border:none;background:transparent;color:var(--paper-dim);padding:8px 16px;border-radius:999px;cursor:pointer;font-family:'Cairo';font-weight:700;font-size:13px;
  }
  .mode-toggle button.active{background:var(--gold);color:var(--pitch-dark);}

  main{max-width:1100px;margin:0 auto;padding:28px;}
  .empty-hint{text-align:center;color:var(--paper-dim);padding:60px 20px;}
  .empty-hint button{margin-top:14px;}

  /* Scoreboard hero */
  .hero{
    display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:36px;
  }
  @media (max-width:720px){.hero{grid-template-columns:1fr;}}
  .board{
    background:var(--pitch);
    border:2px solid var(--pitch-line);
    border-radius:14px;
    padding:20px 22px;
    position:relative;
    overflow:hidden;
  }
  .board::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(212,167,44,0.08), transparent 60%);
  }
  .board .tag{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'Cairo';font-weight:800;font-size:13px;letter-spacing:1px;
    padding:4px 12px;border-radius:6px;margin-bottom:14px;
  }
  .board.live .tag{background:var(--red-card);color:#fff;}
  .board.live .tag .pulse{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .board.next .tag{background:var(--gold);color:var(--pitch-dark);}
  .matchup{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1;}
  .team-block{flex:1;text-align:center;}
  .team-name{font-family:'Cairo';font-weight:700;font-size:19px;line-height:1.3;}
  .score{font-family:'Space Mono';font-weight:700;font-size:44px;display:flex;align-items:center;gap:14px;padding:0 8px;}
  .vs-label{font-family:'Space Mono';color:var(--paper-dim);font-size:13px;}
  .board .meta{margin-top:14px;color:var(--paper-dim);font-size:13px;font-family:'Space Mono';text-align:center;}
  .board .motm{margin-top:10px;text-align:center;font-size:13px;color:var(--gold-bright);}
  .board.empty{display:flex;align-items:center;justify-content:center;color:var(--paper-dim);font-size:14px;min-height:140px;}

  /* Standings */
  section.block{margin-bottom:40px;}
  section.block h2{font-size:20px;border-right:4px solid var(--gold);padding-right:12px;margin-bottom:16px;}
  table{width:100%;border-collapse:collapse;background:var(--pitch);border-radius:10px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:center;font-size:14px;}
  th{background:var(--pitch-dark);color:var(--gold);font-family:'Cairo';font-weight:700;font-size:13px;}
  td.team-cell{text-align:right;font-family:'Cairo';font-weight:600;}
  tr:not(:last-child) td{border-bottom:1px solid var(--pitch-line);}
  tr.rank1 td.team-cell{color:var(--gold-bright);}

  /* Fixtures */
  .matchday{margin-bottom:20px;}
  .matchday h3{font-size:15px;color:var(--paper-dim);font-weight:500;margin:0 0 10px;font-family:'Cairo';}
  .match-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--pitch);border:1px solid var(--pitch-line);border-radius:8px;
    padding:12px 16px;margin-bottom:8px;gap:10px;flex-wrap:wrap;
  }
  .match-row .side{flex:1;font-family:'Cairo';font-weight:600;font-size:14px;}
  .match-row .side.home{text-align:left;}
  .match-row .side.away{text-align:right;}
  .match-row .center{text-align:center;min-width:90px;}
  .match-row .center .mono{font-size:18px;font-weight:700;}
  .status-pill{font-size:11px;padding:2px 10px;border-radius:999px;display:inline-block;margin-top:4px;font-family:'Cairo';}
  .status-scheduled{background:var(--pitch-line);color:var(--paper-dim);}
  .status-live{background:var(--red-card);color:#fff;}
  .status-finished{background:var(--pitch-line);color:var(--gold);}
  .match-row .motm-tag{width:100%;text-align:center;font-size:12px;color:var(--gold-bright);margin-top:4px;}

  /* Buttons/forms */
  button{cursor:pointer;font-family:'Tajawal';}
  .btn{
    background:var(--gold);color:var(--pitch-dark);border:none;border-radius:8px;
    padding:9px 18px;font-weight:700;font-family:'Cairo';font-size:14px;
  }
  .btn:hover{background:var(--gold-bright);}
  .btn.ghost{background:transparent;border:1px solid var(--pitch-line);color:var(--paper);}
  .btn.ghost:hover{border-color:var(--gold);}
  .btn.danger{background:var(--red-card);color:#fff;}
  .btn.small{padding:6px 12px;font-size:12px;}
  input,select{
    background:var(--pitch-dark);border:1px solid var(--pitch-line);color:var(--paper);
    padding:9px 12px;border-radius:8px;font-family:'Tajawal';font-size:14px;
  }
  input:focus,select:focus{outline:none;border-color:var(--gold);}

  .admin-card{
    background:var(--pitch);border:1px solid var(--pitch-line);border-radius:12px;padding:20px;margin-bottom:24px;
  }
  .admin-card h3{margin:0 0 14px;font-size:16px;color:var(--gold);}
  .row-inline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
  .team-chip{
    display:inline-flex;align-items:center;gap:8px;background:var(--pitch-dark);
    border:1px solid var(--pitch-line);border-radius:999px;padding:6px 12px;font-size:13px;margin:4px;
  }
  .team-chip button{background:none;border:none;color:var(--red-card);font-weight:700;font-size:14px;}
  .league-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--pitch-line);}
  .match-admin-row{
    display:grid;grid-template-columns:1fr 70px 1fr auto;gap:8px;align-items:center;margin-bottom:8px;
  }
  .match-admin-row select{width:100%;}
  .score-input{width:60px;text-align:center;}
  .subtle{color:var(--paper-dim);font-size:12px;}
  footer{text-align:center;padding:30px;color:var(--paper-dim);font-size:12px;}

  .announcements-board{
    background:var(--pitch);border:1px solid var(--pitch-line);border-right:4px solid var(--gold);
    border-radius:10px;padding:18px 20px;margin-bottom:36px;
  }
  .announcements-board h2{font-size:18px;margin:0 0 12px;border:none;padding:0;}
  .announcement-item{
    padding:10px 0;border-bottom:1px solid var(--pitch-line);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .announcement-item:last-child{border-bottom:none;}
  .announcement-text{font-size:14px;line-height:1.6;}
  .announcement-date{font-size:11px;color:var(--paper-dim);font-family:'Space Mono';white-space:nowrap;}
  textarea{
    background:var(--pitch-dark);border:1px solid var(--pitch-line);color:var(--paper);
    padding:12px;border-radius:8px;font-family:'Tajawal';font-size:14px;width:100%;min-height:220px;resize:vertical;
  }
  textarea:focus{outline:none;border-color:var(--gold);}
  .regulations-content{
    background:var(--pitch);border:1px solid var(--pitch-line);border-radius:12px;padding:26px 30px;
    white-space:pre-wrap;line-height:1.9;font-size:15px;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <h1>منصة الدوريات</h1>
  </div>
  <div class="league-tabs" id="leagueTabs"></div>
  <div class="mode-toggle">
    <button id="btnPublic" class="active">العرض العام</button>
    <button id="btnAdmin">لوحة التحكم</button>
    <button id="btnRegs">لوائح اللجنة الرياضية</button>
  </div>
</header>

<main id="app"></main>

<footer>منصة إدارة دوريات كرة القدم — البيانات محفوظة ومشتركة بين الزوار</footer>

<script>
let state = { leagues: [], activeLeagueId: null, announcements: [], regulationsText: '' };
let mode = 'public'; // 'public' | 'admin' | 'regulations'
let adminUnlocked = false;
const ADMIN_PIN = '12e34e';

function uid(){ return Math.random().toString(36).slice(2,9); }

async function loadState(){
  try{
    const res = await window.storage.get('league-app-state', true);
    if(res && res.value){ state = JSON.parse(res.value); }
  }catch(e){ console.log('no existing state yet'); }
  if(!state.announcements) state.announcements = [];
  if(typeof state.regulationsText !== 'string') state.regulationsText = '';
  if(!state.activeLeagueId && state.leagues.length){ state.activeLeagueId = state.leagues[0].id; }
  render();
}
async function saveState(){
  try{
    await window.storage.set('league-app-state', JSON.stringify(state), true);
  }catch(e){ console.error('save failed', e); }
}

function activeLeague(){
  return state.leagues.find(l=>l.id===state.activeLeagueId) || null;
}
function teamName(league, teamId){
  const t = league.teams.find(t=>t.id===teamId);
  return t ? t.name : '—';
}

function computeStandings(league){
  const table = {};
  league.teams.forEach(t=>{ table[t.id] = {id:t.id,name:t.name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  league.matchdays.forEach(md=>{
    md.matches.forEach(m=>{
      if(m.status!=='finished' || m.homeScore===null || m.awayScore===null) return;
      const h = table[m.home], a = table[m.away];
      if(!h || !a) return;
      h.p++; a.p++;
      h.gf += m.homeScore; h.ga += m.awayScore;
      a.gf += m.awayScore; a.ga += m.homeScore;
      if(m.homeScore > m.awayScore){ h.w++; h.pts+=3; a.l++; }
      else if(m.homeScore < m.awayScore){ a.w++; a.pts+=3; h.l++; }
      else { h.d++; a.d++; h.pts++; a.pts++; }
    });
  });
  return Object.values(table).sort((x,y)=> (y.pts-x.pts) || ((y.gf-y.ga)-(x.gf-x.ga)) || (y.gf-x.gf));
}

function findFeatured(league){
  let live = null, next = null;
  const all = [];
  league.matchdays.forEach(md=> md.matches.forEach(m=> all.push(m)));
  live = all.find(m=>m.status==='live') || null;
  const scheduled = all.filter(m=>m.status==='scheduled' && m.date)
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
  next = scheduled[0] || null;
  return {live, next};
}

function fmtDate(m){
  if(!m.date) return 'موعد غير محدد';
  return m.date + (m.time ? ' — ' + m.time : '');
}

function render(){
  renderTabs();
  document.getElementById('btnPublic').classList.toggle('active', mode==='public');
  document.getElementById('btnAdmin').classList.toggle('active', mode==='admin');
  document.getElementById('btnRegs').classList.toggle('active', mode==='regulations');
  const app = document.getElementById('app');
  if(mode==='public') app.innerHTML = renderPublic();
  else if(mode==='admin') app.innerHTML = renderAdmin();
  else app.innerHTML = renderRegulations();
  attachHandlers();
}

function renderTabs(){
  const wrap = document.getElementById('leagueTabs');
  if(!state.leagues.length){ wrap.innerHTML=''; return; }
  wrap.innerHTML = state.leagues.map(l=>
    `<button class="league-tab ${l.id===state.activeLeagueId?'active':''}" data-league="${l.id}">${l.name}</button>`
  ).join('');
}

function renderPublic(){
  const league = activeLeague();
  if(!league){
    const noLeagueAnnouncements = state.announcements.length ? `
      <div class="announcements-board">
        <h2>التصاريح</h2>
        ${state.announcements.slice().reverse().map(a=>`
          <div class="announcement-item">
            <div class="announcement-text">${a.text}</div>
            <div class="announcement-date">${a.date}</div>
          </div>
        `).join('')}
      </div>` : '';
    return `${noLeagueAnnouncements}<div class="empty-hint"><h2>لا يوجد دوري بعد</h2><p>انتقل إلى لوحة التحكم لإنشاء أول دوري.</p></div>`;
  }
  const {live, next} = findFeatured(league);
  const standings = computeStandings(league);

  const heroLive = live ? `
    <div class="board live">
      <span class="tag"><span class="pulse"></span> المباراة الآن</span>
      <div class="matchup">
        <div class="team-block"><div class="team-name">${teamName(league,live.home)}</div></div>
        <div class="score mono">${live.homeScore ?? 0} <span class="vs-label">—</span> ${live.awayScore ?? 0}</div>
        <div class="team-block"><div class="team-name">${teamName(league,live.away)}</div></div>
      </div>
      <div class="meta">${fmtDate(live)}</div>
      ${live.motm ? `<div class="motm">⭐ أفضل لاعب: ${live.motm}</div>` : ''}
    </div>` : `<div class="board empty">لا توجد مباراة جارية الآن</div>`;

  const heroNext = next ? `
    <div class="board next">
      <span class="tag">المباراة القادمة</span>
      <div class="matchup">
        <div class="team-block"><div class="team-name">${teamName(league,next.home)}</div></div>
        <div class="score mono"><span class="vs-label" style="font-size:20px">VS</span></div>
        <div class="team-block"><div class="team-name">${teamName(league,next.away)}</div></div>
      </div>
      <div class="meta">${fmtDate(next)}</div>
    </div>` : `<div class="board empty">لا توجد مباراة قادمة مجدولة</div>`;

  const standingsRows = standings.map((r,i)=>`
    <tr class="${i===0?'rank1':''}">
      <td>${i+1}</td>
      <td class="team-cell">${r.name}</td>
      <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gf}</td><td>${r.ga}</td><td>${r.gf-r.ga}</td>
      <td class="mono" style="color:var(--gold-bright);font-weight:700">${r.pts}</td>
    </tr>`).join('');

  const fixturesHtml = league.matchdays.length ? league.matchdays.map(md=>`
    <div class="matchday">
      <h3>${md.name}</h3>
      ${md.matches.map(m=>`
        <div class="match-row">
          <div class="side home">${teamName(league,m.home)}</div>
          <div class="center">
            ${m.status==='finished'
              ? `<span class="mono">${m.homeScore} - ${m.awayScore}</span>`
              : `<span class="subtle">${fmtDate(m)}</span>`}
            <div><span class="status-pill status-${m.status}">${m.status==='finished'?'انتهت':m.status==='live'?'مباشر':'مجدولة'}</span></div>
          </div>
          <div class="side away">${teamName(league,m.away)}</div>
          ${m.motm ? `<div class="motm-tag">⭐ أفضل لاعب في المباراة: ${m.motm}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('') : `<p class="subtle">لا توجد جداول مباريات بعد.</p>`;

  const announcementsHtml = state.announcements.length ? `
    <div class="announcements-board">
      <h2>التصاريح</h2>
      ${state.announcements.slice().reverse().map(a=>`
        <div class="announcement-item">
          <div class="announcement-text">${a.text}</div>
          <div class="announcement-date">${a.date}</div>
        </div>
      `).join('')}
    </div>` : '';

  return `
    <div class="hero">${heroLive}${heroNext}</div>
    ${announcementsHtml}
    <section class="block">
      <h2>ترتيب الدوري — ${league.name}</h2>
      <table>
        <thead><tr><th>#</th><th style="text-align:right">الفريق</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>له</th><th>عليه</th><th>الفرق</th><th>نقاط</th></tr></thead>
        <tbody>${standingsRows || `<tr><td colspan="10" class="subtle">لا توجد فرق مضافة بعد</td></tr>`}</tbody>
      </table>
    </section>
    <section class="block">
      <h2>جدول المباريات والنتائج</h2>
      ${fixturesHtml}
    </section>
  `;
}

function renderRegulations(){
  const text = state.regulationsText.trim();
  return `
    <section class="block">
      <h2>لوائح اللجنة الرياضية</h2>
      <div class="regulations-content">${text ? text.replace(/</g,'&lt;') : '<span class="subtle">لم تُضف لوائح اللجنة الرياضية بعد.</span>'}</div>
    </section>
  `;
}

function renderAdmin(){
  if(!adminUnlocked){
    return `
      <div class="empty-hint">
        <h2>دخول لوحة التحكم</h2>
        <p>أدخل رمز الدخول الخاص بمالك الموقع</p>
        <input type="password" id="pinInput" placeholder="رمز الدخول" style="max-width:200px;text-align:center;">
        <br><button class="btn" id="pinSubmit" style="margin-top:14px;">دخول</button>
      </div>`;
  }

  const league = activeLeague();

  const leaguesListHtml = state.leagues.map(l=>`
    <div class="league-row">
      <span>${l.name} ${l.id===state.activeLeagueId ? '<span class="subtle">(محدد حالياً)</span>' : ''}</span>
      <div class="row-inline">
        <button class="btn ghost small" data-select-league="${l.id}">تحديد</button>
        <button class="btn danger small" data-delete-league="${l.id}">حذف</button>
      </div>
    </div>
  `).join('') || `<p class="subtle">لا توجد دوريات بعد</p>`;

  let leagueManagement = '';
  if(league){
    const teamsHtml = league.teams.map(t=>`
      <span class="team-chip">${t.name} <button data-delete-team="${t.id}">×</button></span>
    `).join('') || `<span class="subtle">لا توجد فرق بعد</span>`;

    const teamOptions = league.teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');

    const matchdaysHtml = league.matchdays.map(md=>`
      <div class="admin-card">
        <h3>${md.name} <button class="btn danger small" style="float:left" data-delete-matchday="${md.id}">حذف الجدول</button></h3>
        ${md.matches.map(m=>`
          <div class="match-admin-row">
            <select disabled>${league.teams.map(t=>`<option ${t.id===m.home?'selected':''}>${t.name}</option>`).join('')}</select>
            <div style="display:flex;gap:4px;justify-content:center;">
              <input type="number" min="0" class="score-input" value="${m.homeScore ?? ''}" placeholder="-" data-score-home="${m.id}">
              <input type="number" min="0" class="score-input" value="${m.awayScore ?? ''}" placeholder="-" data-score-away="${m.id}">
            </div>
            <select disabled>${league.teams.map(t=>`<option ${t.id===m.away?'selected':''}>${t.name}</option>`).join('')}</select>
            <button class="btn danger small" data-delete-match="${m.id}">حذف</button>
          </div>
          <div class="row-inline" style="margin-right:0;margin-bottom:14px;">
            <input type="date" data-date="${m.id}" value="${m.date||''}" style="font-size:12px;">
            <input type="time" data-time="${m.id}" value="${m.time||''}" style="font-size:12px;">
            <select data-status="${m.id}" style="font-size:12px;">
              <option value="scheduled" ${m.status==='scheduled'?'selected':''}>مجدولة</option>
              <option value="live" ${m.status==='live'?'selected':''}>مباشرة الآن</option>
              <option value="finished" ${m.status==='finished'?'selected':''}>انتهت</option>
            </select>
            <input type="text" data-motm="${m.id}" value="${m.motm||''}" placeholder="أفضل لاعب (اختياري)" style="font-size:12px;flex:1;min-width:140px;">
            <button class="btn small" data-save-match="${m.id}">حفظ</button>
          </div>
        `).join('')}
        <div class="row-inline" style="margin-top:10px;">
          <select id="newMatchHome_${md.id}"><option value="">الفريق المضيف</option>${teamOptions}</select>
          <select id="newMatchAway_${md.id}"><option value="">الفريق الضيف</option>${teamOptions}</select>
          <button class="btn small" data-add-match="${md.id}">إضافة مباراة</button>
        </div>
      </div>
    `).join('');

    leagueManagement = `
      <div class="admin-card">
        <h3>فرق دوري "${league.name}"</h3>
        <div>${teamsHtml}</div>
        <div class="row-inline" style="margin-top:12px;">
          <input type="text" id="newTeamName" placeholder="اسم الفريق الجديد">
          <button class="btn small" id="addTeamBtn">إضافة فريق</button>
        </div>
      </div>

      <div class="admin-card">
        <h3>إنشاء جدول مباريات جديد</h3>
        <div class="row-inline">
          <input type="text" id="newMatchdayName" placeholder="مثال: الجولة 1">
          <button class="btn small" id="addMatchdayBtn">إنشاء الجدول</button>
        </div>
      </div>

      <h3 style="color:var(--gold);margin-bottom:10px;">جداول المباريات</h3>
      ${matchdaysHtml || `<p class="subtle">لا توجد جداول بعد</p>`}
    `;
  }

  const announcementsAdminHtml = state.announcements.slice().reverse().map(a=>`
    <div class="league-row">
      <span>${a.text} <span class="subtle">(${a.date})</span></span>
      <button class="btn danger small" data-delete-announcement="${a.id}">حذف</button>
    </div>
  `).join('') || `<p class="subtle">لا توجد تصاريح بعد</p>`;

  return `
    <div class="admin-card">
      <h3>التصاريح</h3>
      ${announcementsAdminHtml}
      <div class="row-inline" style="margin-top:14px;">
        <input type="text" id="newAnnouncementText" placeholder="نص التصريح" style="flex:1;min-width:200px;">
        <button class="btn small" id="addAnnouncementBtn">نشر التصريح</button>
      </div>
    </div>

    <div class="admin-card">
      <h3>لوائح اللجنة الرياضية</h3>
      <textarea id="regulationsTextArea" placeholder="اكتب لوائح اللجنة الرياضية هنا...">${state.regulationsText}</textarea>
      <div class="row-inline" style="margin-top:10px;">
        <button class="btn small" id="saveRegulationsBtn">حفظ اللوائح</button>
      </div>
    </div>

    <div class="admin-card">
      <h3>إدارة الدوريات</h3>
      ${leaguesListHtml}
      <div class="row-inline" style="margin-top:14px;">
        <input type="text" id="newLeagueName" placeholder="اسم الدوري الجديد">
        <button class="btn small" id="addLeagueBtn">إنشاء دوري</button>
      </div>
    </div>
    ${league ? leagueManagement : `<p class="subtle">أنشئ دورياً أولاً للبدء بإضافة الفرق والمباريات.</p>`}
  `;
}

function attachHandlers(){
  document.getElementById('btnPublic').onclick = ()=>{ mode='public'; render(); };
  document.getElementById('btnAdmin').onclick = ()=>{ mode='admin'; render(); };
  document.getElementById('btnRegs').onclick = ()=>{ mode='regulations'; render(); };

  document.querySelectorAll('[data-league]').forEach(b=>{
    b.onclick = ()=>{ state.activeLeagueId = b.dataset.league; render(); };
  });

  if(!adminUnlocked && mode==='admin'){
    const submit = document.getElementById('pinSubmit');
    if(submit) submit.onclick = ()=>{
      const val = document.getElementById('pinInput').value;
      if(val === ADMIN_PIN){ adminUnlocked = true; render(); }
      else alert('رمز الدخول غير صحيح');
    };
    return;
  }
  if(mode!=='admin') return;

  const addAnnouncementBtn = document.getElementById('addAnnouncementBtn');
  if(addAnnouncementBtn) addAnnouncementBtn.onclick = ()=>{
    const text = document.getElementById('newAnnouncementText').value.trim();
    if(!text) return;
    const now = new Date();
    const date = now.toISOString().slice(0,10);
    state.announcements.push({id:uid(), text, date});
    saveState(); render();
  };
  document.querySelectorAll('[data-delete-announcement]').forEach(b=>{
    b.onclick = ()=>{
      state.announcements = state.announcements.filter(a=>a.id!==b.dataset.deleteAnnouncement);
      saveState(); render();
    };
  });

  const saveRegulationsBtn = document.getElementById('saveRegulationsBtn');
  if(saveRegulationsBtn) saveRegulationsBtn.onclick = ()=>{
    state.regulationsText = document.getElementById('regulationsTextArea').value;
    saveState();
    alert('تم حفظ اللوائح');
  };

  const addLeagueBtn = document.getElementById('addLeagueBtn');
  if(addLeagueBtn) addLeagueBtn.onclick = ()=>{
    const name = document.getElementById('newLeagueName').value.trim();
    if(!name) return;
    const l = {id:uid(), name, teams:[], matchdays:[]};
    state.leagues.push(l);
    state.activeLeagueId = l.id;
    saveState(); render();
  };

  document.querySelectorAll('[data-select-league]').forEach(b=>{
    b.onclick = ()=>{ state.activeLeagueId = b.dataset.selectLeague; render(); };
  });
  document.querySelectorAll('[data-delete-league]').forEach(b=>{
    b.onclick = ()=>{
      if(!confirm('حذف هذا الدوري نهائياً؟')) return;
      state.leagues = state.leagues.filter(l=>l.id!==b.dataset.deleteLeague);
      if(state.activeLeagueId === b.dataset.deleteLeague){
        state.activeLeagueId = state.leagues[0]?.id || null;
      }
      saveState(); render();
    };
  });

  const addTeamBtn = document.getElementById('addTeamBtn');
  if(addTeamBtn) addTeamBtn.onclick = ()=>{
    const name = document.getElementById('newTeamName').value.trim();
    if(!name) return;
    activeLeague().teams.push({id:uid(), name});
    saveState(); render();
  };
  document.querySelectorAll('[data-delete-team]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.teams = league.teams.filter(t=>t.id!==b.dataset.deleteTeam);
      saveState(); render();
    };
  });

  const addMatchdayBtn = document.getElementById('addMatchdayBtn');
  if(addMatchdayBtn) addMatchdayBtn.onclick = ()=>{
    const name = document.getElementById('newMatchdayName').value.trim();
    if(!name) return;
    activeLeague().matchdays.push({id:uid(), name, matches:[]});
    saveState(); render();
  };
  document.querySelectorAll('[data-delete-matchday]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.matchdays = league.matchdays.filter(md=>md.id!==b.dataset.deleteMatchday);
      saveState(); render();
    };
  });

  document.querySelectorAll('[data-add-match]').forEach(b=>{
    b.onclick = ()=>{
      const mdId = b.dataset.addMatch;
      const league = activeLeague();
      const md = league.matchdays.find(m=>m.id===mdId);
      const home = document.getElementById('newMatchHome_'+mdId).value;
      const away = document.getElementById('newMatchAway_'+mdId).value;
      if(!home || !away || home===away){ alert('اختر فريقين مختلفين'); return; }
      md.matches.push({id:uid(), home, away, homeScore:null, awayScore:null, status:'scheduled', date:'', time:'', motm:''});
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-delete-match]').forEach(b=>{
    b.onclick = ()=>{
      const league = activeLeague();
      league.matchdays.forEach(md=>{ md.matches = md.matches.filter(m=>m.id!==b.dataset.deleteMatch); });
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-save-match]').forEach(b=>{
    b.onclick = ()=>{
      const mId = b.dataset.saveMatch;
      const league = activeLeague();
      let match;
      league.matchdays.forEach(md=>{ const f = md.matches.find(m=>m.id===mId); if(f) match=f; });
      if(!match) return;
      const hs = document.querySelector(`[data-score-home="${mId}"]`).value;
      const as = document.querySelector(`[data-score-away="${mId}"]`).value;
      match.homeScore = hs===''? null : parseInt(hs);
      match.awayScore = as===''? null : parseInt(as);
      match.date = document.querySelector(`[data-date="${mId}"]`).value;
      match.time = document.querySelector(`[data-time="${mId}"]`).value;
      match.status = document.querySelector(`[data-status="${mId}"]`).value;
      match.motm = document.querySelector(`[data-motm="${mId}"]`).value;
      saveState(); render();
    };
  });
}

loadState();
</script>
</body>
</html>
